services:
  neo4j:
    image: neo4j:5-community
    container_name: scatterbrained-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"   # HTTP browser
      - "7687:7687"   # Bolt
    environment:
      NEO4J_AUTH: "neo4j/scatterbrained-local"
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_apoc_export_file_enabled: "true"
      NEO4J_apoc_import_file_enabled: "true"
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
    volumes:
      - scatterbrained_data:/data
      - scatterbrained_logs:/logs

volumes:
  scatterbrained_data:
    name: scatterbrained_data
  scatterbrained_logs:
    name: scatterbrained_logs
